name: invoicer
icon: null
processes:
  pnpm:dev:
    command: pnpm run dev
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Pail:
    command: php artisan pail
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Queue:
    command: php artisan queue:work
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Scheduler:
    command: php artisan schedule:work
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Logs:
    command: tail -n 50 -f storage/logs/laravel.log
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Pint:
    command: vendor/bin/pint
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
